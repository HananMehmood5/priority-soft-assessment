services:
  db:
    image: postgres:15-alpine
    container_name: shiftsync-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shiftsync
      POSTGRES_PASSWORD: shiftsync
      POSTGRES_DB: shiftsync
    volumes:
      - shiftsync_pgdata:/var/lib/postgresql/data

volumes:
  shiftsync_pgdata:
